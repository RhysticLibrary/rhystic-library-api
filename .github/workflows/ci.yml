name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR so we don't burn CI minutes
# on commits the user has already replaced.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Individual jobs widen as needed.
permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Run markdownlint
        # Pin matches .pre-commit-config.yaml so local and CI catch the same rules.
        # Bump both when upgrading.
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md" "#node_modules" "#docs/superpowers/**"

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check tools/adr
      - name: Ruff format check
        run: ruff format --check tools/adr

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage
        run: pytest --cov=tools/adr --cov-report=term-missing

  adr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run validator (merge gate)
        run: python tools/adr/validate.py --merge-gate

  gitleaks:
    runs-on: ubuntu-latest
    # gitleaks-action v2 posts findings as PR comments.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Java CI is a fail-fast chain that compiles exactly once:
  #   java-style (source-only, no compile) -> java-build (compile + SpotBugs,
  #   uploads compiled output) -> java-test (reuses that output for tests + JaCoCo).
  # A cheap style failure aborts before any compile; the compiled classes are
  # shared via artifact so the test stage never recompiles main.
  java-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      # Spotless (google-java-format) and Checkstyle read source files only, so
      # they run as direct goals with no compilation and fail fast on style.
      - name: Spotless and Checkstyle
        run: ./mvnw -B spotless:check checkstyle:check

  java-build:
    needs: java-style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      # Compile main once and run SpotBugs + FindSecBugs (needs compiled classes).
      # Tests, JaCoCo, and the source-only gates (done in java-style) are skipped.
      - name: Compile and static analysis
        run: ./mvnw -B -Dmaven.test.skip=true -Djacoco.skip=true -Dspotless.check.skip=true -Dcheckstyle.skip=true verify
      - name: Upload compiled output
        uses: actions/upload-artifact@v4
        with:
          name: java-build
          path: boot/target
          retention-days: 1

  java-test:
    needs: java-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: java-build
          path: boot/target
      # Reuse the compiled main classes from java-build (maven.main.skip => no
      # main recompile); run the tests and the JaCoCo coverage gate only. The
      # lint/style/SpotBugs gates already passed upstream.
      - name: Test and coverage
        run: ./mvnw -B -Dmaven.main.skip=true -Dspotless.check.skip=true -Dcheckstyle.skip=true -Dspotbugs.skip=true verify
