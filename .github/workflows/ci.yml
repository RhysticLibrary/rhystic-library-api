name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR so we don't burn CI minutes
# on commits the user has already replaced.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Individual jobs widen as needed.
permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run markdownlint
        # Pin matches .pre-commit-config.yaml so local and CI catch the same rules.
        # Bump both when upgrading.
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md" "#node_modules" "#docs/superpowers/**"

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check tools/adr
      - name: Ruff format check
        run: ruff format --check tools/adr

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage
        run: pytest --cov=tools/adr --cov-report=term-missing

  adr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run validator (merge gate)
        run: python tools/adr/validate.py --merge-gate

  gitleaks:
    runs-on: ubuntu-latest
    # gitleaks-action v2 posts findings as PR comments.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
