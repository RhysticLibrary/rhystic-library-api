[tool.pytest.ini_options]
testpaths = ["tools/adr/tests", "tools/deps/tests"]
pythonpath = ["tools/adr", "tools/deps"]
addopts = "-ra --strict-markers"

[tool.coverage.run]
source = ["tools/adr", "tools/deps"]
omit = [
    "tools/adr/tests/*",
    # Skill CLI scripts are exercised end-to-end via subprocess in
    # test_skill_scripts.py. coverage.py doesn't follow subprocess
    # boundaries, so these would show 0% despite being thoroughly tested.
    # Excluded to keep the threshold meaningful for the directly-tested
    # library code.
    "tools/adr/list_adrs.py",
    "tools/adr/find_adrs.py",
    "tools/adr/show_adr.py",
    "tools/adr/list_tags.py",
    "tools/adr/tag_usage.py",
    "tools/adr/new_adr.py",
    "tools/adr/add_tag.py",
    "tools/deps/check_drift.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    'if __name__ == "__main__":',
]
# Threshold is set at the current floor minus a small margin; raise as
# coverage improves. Drops below this fail CI.
fail_under = 92

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [".venv", "docs/superpowers"]

[tool.ruff.lint]
# Pragmatic selection — pycodestyle + pyflakes baseline, plus categories that
# caught real defects in past reviews (RUF, TRY, C4, ARG, B, UP), import
# sorting (I), and docstring presence (D).
select = ["E", "F", "W", "I", "B", "RUF", "TRY", "C4", "ARG", "UP", "D"]
ignore = [
    # Long messages outside the exception class are fine for our small CLI tools.
    "TRY003",
    # Conflicting docstring style rules — pick one of each pair via the pep257
    # convention preset.
    "D203",  # 1 blank line before class docstring (conflicts with D211)
    "D213",  # Multi-line docstring summary on second line (conflicts with D212)
    # We're enforcing presence + basic structure; not enforcing prose mechanics.
    "D205",  # 1 blank line required between summary and description
    "D400",  # First line ends with a period (we sometimes don't)
    "D401",  # First line in imperative mood
    "D415",  # First line ends with punctuation
]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.per-file-ignores]
# Tests document themselves through descriptive names + inline comments;
# enforcing module / class / function docstrings here is noise.
"tools/adr/tests/**" = ["D"]

[tool.ruff.format]
# Defaults are sensible (double quotes, 88-char default; line-length above wins).
